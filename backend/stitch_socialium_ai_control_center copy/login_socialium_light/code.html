<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .bg-brand-gradient {
            background: linear-gradient(135deg, #6750A4 0%, #9C27B0 100%);
        }
        .soft-shadow {
            box-shadow: 0px 2px 4px rgba(0,0,0,0.02);
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-bright": "#fdf7ff",
                        "outline": "#7a7582",
                        "on-tertiary": "#ffffff",
                        "primary": "#4f378a",
                        "on-surface": "#1d1b20",
                        "on-primary-fixed": "#22005d",
                        "tertiary": "#765b00",
                        "tertiary-fixed": "#ffdf93",
                        "surface-tint": "#6750a4",
                        "surface": "#fdf7ff",
                        "primary-fixed": "#e9ddff",
                        "on-error": "#ffffff",
                        "inverse-surface": "#322f35",
                        "on-primary-container": "#e0d2ff",
                        "surface-container-highest": "#e6e0e9",
                        "on-tertiary-fixed": "#241a00",
                        "on-secondary-container": "#69007a",
                        "secondary-fixed-dim": "#f9abff",
                        "surface-container-lowest": "#ffffff",
                        "surface-container": "#f2ecf4",
                        "on-tertiary-fixed-variant": "#594400",
                        "secondary-container": "#ed76fd",
                        "tertiary-container": "#c9a74d",
                        "surface-container-low": "#f8f2fa",
                        "on-primary-fixed-variant": "#4f378a",
                        "surface-dim": "#ded8e0",
                        "error-container": "#ffdad6",
                        "primary-fixed-dim": "#cfbcff",
                        "inverse-on-surface": "#f5eff7",
                        "background": "#fdf7ff",
                        "surface-container-high": "#ece6ee",
                        "secondary": "#9a25ae",
                        "on-error-container": "#93000a",
                        "inverse-primary": "#cfbcff",
                        "error": "#ba1a1a",
                        "secondary-fixed": "#ffd6fe",
                        "outline-variant": "#cbc4d2",
                        "on-surface-variant": "#494551",
                        "surface-variant": "#e6e0e9",
                        "on-primary": "#ffffff",
                        "on-background": "#1d1b20",
                        "tertiary-fixed-dim": "#e7c365",
                        "on-tertiary-container": "#503d00",
                        "on-secondary-fixed": "#35003f",
                        "on-secondary": "#ffffff",
                        "primary-container": "#6750a4",
                        "on-secondary-fixed-variant": "#7b008f"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "margin-desktop": "48px",
                        "gutter": "24px",
                        "md": "16px",
                        "lg": "24px",
                        "margin-mobile": "16px",
                        "sm": "12px",
                        "base": "8px",
                        "xs": "4px",
                        "xl": "32px"
                    },
                    "fontFamily": {
                        "headline-lg-mobile": ["Plus Jakarta Sans"],
                        "body-md": ["Plus Jakarta Sans"],
                        "label-sm": ["Plus Jakarta Sans"],
                        "headline-xl": ["Plus Jakarta Sans"],
                        "headline-xl-mobile": ["Plus Jakarta Sans"],
                        "headline-lg": ["Plus Jakarta Sans"],
                        "label-lg": ["Plus Jakarta Sans"],
                        "headline-md": ["Plus Jakarta Sans"],
                        "body-sm": ["Plus Jakarta Sans"],
                        "body-lg": ["Plus Jakarta Sans"]
                    },
                    "fontSize": {
                        "headline-lg-mobile": ["24px", {"lineHeight": "32px", "letterSpacing": "-0.01em", "fontWeight": "700"}],
                        "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                        "label-sm": ["12px", {"lineHeight": "16px", "letterSpacing": "0.02em", "fontWeight": "500"}],
                        "headline-xl": ["40px", {"lineHeight": "48px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                        "headline-xl-mobile": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                        "headline-lg": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.01em", "fontWeight": "700"}],
                        "label-lg": ["14px", {"lineHeight": "20px", "letterSpacing": "0.01em", "fontWeight": "600"}],
                        "headline-md": ["24px", {"lineHeight": "32px", "fontWeight": "600"}],
                        "body-sm": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
                        "body-lg": ["18px", {"lineHeight": "28px", "fontWeight": "400"}]
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-background text-on-background min-h-screen flex items-center justify-center p-margin-mobile md:p-margin-desktop">
<!-- Page Content Canvas -->
<main class="w-full max-w-[480px]">
<!-- Brand Identity Container -->
<div class="flex flex-col items-center mb-xl text-center">
<div class="mb-lg p-sm bg-surface-container-lowest rounded-xl soft-shadow border border-surface-container-highest">
<span class="text-transparent bg-clip-text bg-brand-gradient font-headline-xl text-headline-xl-mobile md:text-headline-xl">Socialium</span>
</div>
<h1 class="font-headline-lg-mobile md:font-headline-lg text-headline-lg-mobile md:text-headline-lg text-on-surface mb-xs">Welcome Back</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Sign in to manage your AI automations.</p>
</div>
<!-- Login Card -->
<div class="bg-surface-container-lowest rounded-xl border border-surface-container-highest p-lg md:p-xl soft-shadow">
<form class="space-y-lg">
<!-- Username/Email Field -->
<div class="space-y-xs">
<label class="font-label-lg text-label-lg text-on-surface" for="email">Email Address</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-md flex items-center pointer-events-none text-on-surface-variant group-focus-within:text-primary transition-colors">
<span class="material-symbols-outlined" data-icon="mail">mail</span>
</div>
<input class="block w-full h-[48px] pl-[48px] pr-md bg-background border border-outline-variant rounded-lg font-body-md text-body-md focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all placeholder:text-outline" id="email" name="email" placeholder="name@company.com" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-xs">
<div class="flex justify-between items-center">
<label class="font-label-lg text-label-lg text-on-surface" for="password">Password</label>
<a class="font-label-sm text-label-sm text-primary hover:underline transition-all" href="#">Forgot password?</a>
</div>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-md flex items-center pointer-events-none text-on-surface-variant group-focus-within:text-primary transition-colors">
<span class="material-symbols-outlined" data-icon="lock">lock</span>
</div>
<input class="block w-full h-[48px] pl-[48px] pr-md bg-background border border-outline-variant rounded-lg font-body-md text-body-md focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all placeholder:text-outline" id="password" name="password" placeholder="••••••••" type="password"/>
<button class="absolute inset-y-0 right-0 pr-md flex items-center text-on-surface-variant hover:text-on-surface transition-colors" type="button">
<span class="material-symbols-outlined" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<!-- Remember Me Toggle -->
<div class="flex items-center space-x-sm">
<div class="relative flex items-center">
<input class="w-5 h-5 rounded border-outline-variant text-primary focus:ring-primary/20 focus:ring-offset-0" id="remember" type="checkbox"/>
</div>
<label class="font-body-sm text-body-sm text-on-surface-variant" for="remember">Keep me logged in for 30 days</label>
</div>
<!-- Submit Button -->
<button class="w-full h-[48px] bg-brand-gradient text-on-primary font-label-lg text-label-lg rounded-full hover:opacity-90 active:scale-[0.98] transition-all soft-shadow" type="submit">
                    Sign In
                </button>
</form>
<!-- Social Login Divider -->
<div class="relative my-xl">
<div class="absolute inset-0 flex items-center">
<div class="w-full border-t border-surface-container-highest"></div>
</div>
<div class="relative flex justify-center text-label-sm font-label-sm">
<span class="px-md bg-surface-container-lowest text-outline">Or continue with</span>
</div>
</div>
<!-- Social Options -->
<div class="grid grid-cols-2 gap-md">
<button class="flex items-center justify-center h-[48px] space-x-sm bg-surface-container-low border border-surface-container-highest rounded-lg hover:bg-surface-container-high transition-all">
<img alt="Google" class="w-5 h-5" data-alt="A clean, minimalist 3D rendering of the Google logo icon placed on a soft white pedestal. The lighting is bright and airy, reflecting a modern light-mode interface aesthetic with subtle soft shadows. The color palette is clean, dominated by primary colors against a crisp white background." src="https://lh3.googleusercontent.com/aida-public/AB6AXuCaH4Zws9_5HLHdstppgvE4X2ePkMkJvisOWnRCLe1pPZVSODZo2NMIx01hVeO5uNQJ4_YcZ0D4cfnN4wRIWrfb93q3DGzE-wlSIc7wqQG5hEEHUDlxDJkpmpFYN-ZCZNO017OgxvgW3srfJYtwNAwQ0el16JYWpakkiqTQ4LL6Vph_yRoTMwYvu1K8MSVIgoYpTOFcvBtzw1XI0TK3r7vQ6kEFhbjL5ZbLl97qBKciC1Mw_PSG7IxeTbjEd3RdMDsNJuNDCDhBbsE"/>
<span class="font-label-lg text-label-lg text-on-surface">Google</span>
</button>
<button class="flex items-center justify-center h-[48px] space-x-sm bg-surface-container-low border border-surface-container-highest rounded-lg hover:bg-surface-container-high transition-all">
<span class="material-symbols-outlined text-[#1d1b20]" data-icon="brand_awareness">brand_awareness</span>
<span class="font-label-lg text-label-lg text-on-surface">Microsoft</span>
</button>
</div>
</div>
<!-- Footer Links -->
<div class="mt-xl text-center">
<p class="font-body-sm text-body-sm text-on-surface-variant">
                Don't have an account? 
                <a class="text-primary font-label-lg text-label-lg hover:underline ml-xs" href="#">Create Account</a>
</p>
</div>
<!-- System Status Bar (Subtle) -->
<div class="mt-xl flex justify-center items-center space-x-lg text-label-sm font-label-sm text-outline">
<div class="flex items-center space-x-xs">
<span class="w-2 h-2 rounded-full bg-green-500"></span>
<span>Systems operational</span>
</div>
<a class="hover:text-on-surface-variant transition-colors" href="#">Privacy Policy</a>
<a class="hover:text-on-surface-variant transition-colors" href="#">Terms of Service</a>
</div>
</main>
<!-- Decorative background element for luxury feel -->
<div class="fixed top-0 left-0 w-full h-full -z-10 pointer-events-none overflow-hidden opacity-30">
<div class="absolute -top-[10%] -right-[10%] w-[60%] h-[60%] rounded-full bg-gradient-to-br from-primary/10 to-secondary/10 blur-[120px]"></div>
<div class="absolute -bottom-[10%] -left-[10%] w-[50%] h-[50%] rounded-full bg-gradient-to-tr from-tertiary/10 to-primary/10 blur-[100px]"></div>
</div>
</body></html>
